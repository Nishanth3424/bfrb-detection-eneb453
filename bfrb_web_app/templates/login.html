<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFRB Detection System - Sign In</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#1a3a5c"/>
  <link rel="icon" sizes="192x192" href="/static/icon-192.png"/>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #e8edf3;
      --border: #c9d3df;
      --text: #1a2332;
      --text-dim: #5a6a7e;
      --accent: #1a3a5c;
      --accent-light: #2a5a8c;
      --accent-glow: rgba(26, 58, 92, 0.12);
      --danger: #d9534f;
      --success: #2e8b57;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      width: 100%;
      max-width: 460px;
      padding: 20px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .auth-logo-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100% { opacity:1;transform:scale(1) } 50% { opacity:.5;transform:scale(.8) } }
    .auth-subtitle {
      color: var(--text-dim);
      font-size: 14px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
    }
    .auth-tab {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      background: transparent;
      color: var(--text-dim);
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      background: var(--accent);
      color: #fff;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(217, 83, 79, 0.1);
      border: 1px solid rgba(217, 83, 79, 0.3);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: rgba(46, 139, 87, 0.1);
      border: 1px solid rgba(46, 139, 87, 0.3);
      color: var(--success);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg.show { display: block; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .brand-bar {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-dot"></div>
        BFRB Detect
      </div>
      <div class="auth-subtitle">Body-Focused Repetitive Behavior Detection System</div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <!-- Login Form -->
      <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username or Email</label>
          <input type="text" id="login-username" required autocomplete="username" placeholder="Enter your username or email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" placeholder="Enter your password"/>
        </div>
        <button type="submit" class="btn-submit" id="btn-login">Sign In</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-fullname" required placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" required autocomplete="username" placeholder="Choose a username"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required autocomplete="email" placeholder="your.email@example.com"/>
        </div>
        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <input type="password" id="reg-password" required minlength="6" autocomplete="new-password" placeholder="Create a password"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" required minlength="6" autocomplete="new-password" placeholder="Confirm your password"/>
        </div>
        <button type="submit" class="btn-submit" id="btn-register">Create Account</button>
      </form>
    </div>

    <div class="auth-footer">
      ENEB453 Final Project &mdash; University of Maryland
    </div>
    <div class="brand-bar">
      Stack: Python Flask + MediaPipe + SQLite + Chart.js | BFRB Detection v5
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.querySelector(`.auth-tab:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
      hideMessages();
    }

    function hideMessages() {
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('success-msg').classList.remove('show');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success-msg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error-msg').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value.trim(),
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Login failed');
          return;
        }
        window.location.href = '/';
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideMessages();

      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: document.getElementById('reg-fullname').value.trim(),
            username: document.getElementById('reg-username').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            password: password,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Registration failed');
          return;
        }
        window.location.href = '/';
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
